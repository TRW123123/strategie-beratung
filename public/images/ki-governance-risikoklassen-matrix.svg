<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="EU-KI-Verordnung Risikoklassen und Pflichten fuer den Mittelstand">
  <title>EU-KI-Verordnung: Vier Risikoklassen im Mittelstands-Alltag</title>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EF4444"/><stop offset="1" stop-color="#B91C1C"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FB923C"/><stop offset="1" stop-color="#EA580C"/></linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBBF24"/><stop offset="1" stop-color="#F59E0B"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34D399"/><stop offset="1" stop-color="#059669"/></linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg4)"/>

  <text x="60" y="55" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">EU-KI-Verordnung: Vier Risikoklassen</text>
  <text x="60" y="83" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="15">Was im Mittelstand konkret darunter faellt und welche Pflichten jeweils greifen.</text>

  <!-- 4 Boxes -->
  <!-- Unzulaessig -->
  <g>
    <rect x="60" y="120" width="260" height="480" rx="12" fill="url(#red)"/>
    <text x="80" y="155" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">KLASSE 1</text>
    <text x="80" y="185" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">UNZULAESSIG</text>
    <text x="80" y="210" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13" opacity="0.9">Art. 5, seit Feb 2025</text>

    <line x1="80" y1="230" x2="300" y2="230" stroke="#FEF2F2" stroke-opacity="0.3"/>
    <text x="80" y="258" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">KMU-BEISPIELE</text>
    <text x="80" y="282" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">Emotionserkennung</text>
    <text x="80" y="300" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">bei Mitarbeitern</text>
    <text x="80" y="328" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">Social Scoring von</text>
    <text x="80" y="346" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">Kunden</text>
    <text x="80" y="374" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">manipulative Systeme</text>

    <line x1="80" y1="400" x2="300" y2="400" stroke="#FEF2F2" stroke-opacity="0.3"/>
    <text x="80" y="428" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">PFLICHT</text>
    <text x="80" y="452" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">sofort stoppen</text>

    <line x1="80" y1="478" x2="300" y2="478" stroke="#FEF2F2" stroke-opacity="0.3"/>
    <text x="80" y="506" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">STRAFRAHMEN</text>
    <text x="80" y="538" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">35 Mio EUR</text>
    <text x="80" y="560" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">oder 7% Umsatz</text>
  </g>

  <!-- Hochrisiko -->
  <g>
    <rect x="340" y="120" width="260" height="480" rx="12" fill="url(#orange)"/>
    <text x="360" y="155" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">KLASSE 2</text>
    <text x="360" y="185" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">HOCHRISIKO</text>
    <text x="360" y="210" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13" opacity="0.9">Art. 6 + Anhang III, ab Aug 2026</text>

    <line x1="360" y1="230" x2="580" y2="230" stroke="#FEF2F2" stroke-opacity="0.3"/>
    <text x="360" y="258" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">KMU-BEISPIELE</text>
    <text x="360" y="282" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">Recruiting / CV-Screening</text>
    <text x="360" y="310" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">Kredit-Scoring</text>
    <text x="360" y="338" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">Performance-Bewertung</text>
    <text x="360" y="366" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">biometr. Zugangskontrolle</text>

    <line x1="360" y1="400" x2="580" y2="400" stroke="#FEF2F2" stroke-opacity="0.3"/>
    <text x="360" y="428" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">PFLICHT</text>
    <text x="360" y="450" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12">Risk Mgmt, Daten-Gov.,</text>
    <text x="360" y="466" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12">Logging, Human Oversight,</text>
    <text x="360" y="482" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12">Konformitaet + CE</text>

    <line x1="360" y1="500" x2="580" y2="500" stroke="#FEF2F2" stroke-opacity="0.3"/>
    <text x="360" y="528" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">STRAFRAHMEN</text>
    <text x="360" y="560" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">15 Mio EUR</text>
    <text x="360" y="582" fill="#FEF2F2" font-family="Inter, system-ui, sans-serif" font-size="13">oder 3% Umsatz</text>
  </g>

  <!-- Begrenzt -->
  <g>
    <rect x="620" y="120" width="260" height="480" rx="12" fill="url(#yellow)"/>
    <text x="640" y="155" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">KLASSE 3</text>
    <text x="640" y="185" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">BEGRENZT</text>
    <text x="640" y="210" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13" opacity="0.8">Art. 50, Transparenz</text>

    <line x1="640" y1="230" x2="860" y2="230" stroke="#0F172A" stroke-opacity="0.2"/>
    <text x="640" y="258" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">KMU-BEISPIELE</text>
    <text x="640" y="282" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">Kunden-Chatbots</text>
    <text x="640" y="310" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">KI-generierte Texte</text>
    <text x="640" y="338" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">KI-generierte Bilder</text>
    <text x="640" y="366" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">Deepfakes</text>

    <line x1="640" y1="400" x2="860" y2="400" stroke="#0F172A" stroke-opacity="0.2"/>
    <text x="640" y="428" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">PFLICHT</text>
    <text x="640" y="452" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">Kennzeichnung gegen-</text>
    <text x="640" y="470" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">ueber Nutzern und Kunden</text>

    <line x1="640" y1="500" x2="860" y2="500" stroke="#0F172A" stroke-opacity="0.2"/>
    <text x="640" y="528" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">STRAFRAHMEN</text>
    <text x="640" y="560" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">15 Mio EUR</text>
    <text x="640" y="582" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">bei Verstoss</text>
  </g>

  <!-- Minimal -->
  <g>
    <rect x="900" y="120" width="260" height="480" rx="12" fill="url(#green)"/>
    <text x="920" y="155" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">KLASSE 4</text>
    <text x="920" y="185" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">MINIMAL</text>
    <text x="920" y="210" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13" opacity="0.8">implizit, kein Art.</text>

    <line x1="920" y1="230" x2="1140" y2="230" stroke="#0F172A" stroke-opacity="0.2"/>
    <text x="920" y="258" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">KMU-BEISPIELE</text>
    <text x="920" y="282" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">Spam-Filter</text>
    <text x="920" y="310" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">KI-Rechtschreibpruefung</text>
    <text x="920" y="338" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">Recommender ohne</text>
    <text x="920" y="356" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">Profiling</text>

    <line x1="920" y1="400" x2="1140" y2="400" stroke="#0F172A" stroke-opacity="0.2"/>
    <text x="920" y="428" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">PFLICHT</text>
    <text x="920" y="452" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">gute Praxis</text>
    <text x="920" y="470" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">dokumentieren</text>

    <line x1="920" y1="500" x2="1140" y2="500" stroke="#0F172A" stroke-opacity="0.2"/>
    <text x="920" y="528" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">STRAFRAHMEN</text>
    <text x="920" y="560" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">-</text>
  </g>

  <text x="60" y="650" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Im typischen KMU finden wir: 2-5 Anwendungen in Klasse 2, 5-10 in Klasse 3, ein bis zwei Dutzend in Klasse 4.</text>

  <text x="60" y="700" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="13">Quelle: Verordnung (EU) 2024/1689 (KI-VO), Art. 5, 6, 50, 99</text>
  <text x="1140" y="700" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">st-automatisierung.de</text>
</svg>
