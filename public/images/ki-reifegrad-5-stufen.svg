<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="KI-Reifegrad im Mittelstand, fuenf Stufen">
  <title>KI-Reifegrad: Fünf Stufen von Ad-hoc zu Skaliert</title>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6B7280"/><stop offset="1" stop-color="#4B5563"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#A78BFA"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#60A5FA"/><stop offset="1" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#34D399"/><stop offset="1" stop-color="#10B981"/></linearGradient>
    <linearGradient id="s5" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#FBBF24"/><stop offset="1" stop-color="#F59E0B"/></linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg5)"/>

  <text x="60" y="55" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">KI-Reifegrad im Mittelstand</text>
  <text x="60" y="83" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="15">Wo deutscher Mittelstand steht und was der naechste Sprung ist. Stufen als Treppe.</text>

  <!-- Treppe: jede Stufe breiter und hoeher -->
  <!-- Stage 1 -->
  <g>
    <rect x="60" y="560" width="200" height="90" rx="8" fill="url(#s1)"/>
    <text x="80" y="588" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">STUFE 1</text>
    <text x="80" y="615" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">AD-HOC</text>
    <text x="80" y="638" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="12" opacity="0.85">einzelne Experimente</text>
    <text x="80" y="683" text-anchor="start" fill="#F87171" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">ca. 50% KMU</text>
  </g>

  <!-- Stage 2 -->
  <g>
    <rect x="260" y="468" width="220" height="182" rx="8" fill="url(#s2)"/>
    <text x="280" y="498" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">STUFE 2</text>
    <text x="280" y="528" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">AKTIV</text>
    <text x="280" y="553" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="13">erste Piloten,</text>
    <text x="280" y="570" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="13">Budget da,</text>
    <text x="280" y="587" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="13">kein Rahmen</text>
    <text x="280" y="683" text-anchor="start" fill="#FBBF24" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">DE-Schnitt (IW Koeln)</text>
  </g>

  <!-- Stage 3 -->
  <g>
    <rect x="480" y="360" width="220" height="290" rx="8" fill="url(#s3)"/>
    <text x="500" y="390" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">STUFE 3</text>
    <text x="500" y="420" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">OPERATIV</text>
    <text x="500" y="445" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="13">produktive</text>
    <text x="500" y="462" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="13">KI-Nutzung,</text>
    <text x="500" y="479" fill="#F8FAFC" font-family="Inter, system-ui, sans-serif" font-size="13">erste Governance</text>
    <text x="500" y="683" text-anchor="start" fill="#60A5FA" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">ca. 33% KMU</text>
  </g>

  <!-- Stage 4 -->
  <g>
    <rect x="700" y="245" width="220" height="405" rx="8" fill="url(#s4)"/>
    <text x="720" y="275" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">STUFE 4</text>
    <text x="720" y="305" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">SYSTEMISCH</text>
    <text x="720" y="330" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">KI in Strategie,</text>
    <text x="720" y="347" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">Rollen klar,</text>
    <text x="720" y="364" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">Wirkung messbar</text>
    <text x="720" y="683" text-anchor="start" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">unter 5% KMU</text>
  </g>

  <!-- Stage 5 -->
  <g>
    <rect x="920" y="130" width="220" height="520" rx="8" fill="url(#s5)"/>
    <text x="940" y="160" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">STUFE 5</text>
    <text x="940" y="190" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">SKALIERT</text>
    <text x="940" y="215" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">mehrere Bereiche,</text>
    <text x="940" y="232" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">Wettbewerbs-</text>
    <text x="940" y="249" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13">vorteil</text>
    <text x="940" y="683" text-anchor="start" fill="#F59E0B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">selten (ausserhalb Tech)</text>
  </g>

  <!-- Jump Arrows with failure rates -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11">
    <text x="265" y="548" fill="#FCA5A5" font-weight="700">→ 70%</text>
    <text x="265" y="562" fill="#FCA5A5">scheitern hier</text>

    <text x="485" y="440" fill="#FCA5A5" font-weight="700">→ Daten-Silos</text>
    <text x="485" y="454" fill="#FCA5A5">PoC-Purgatory</text>

    <text x="705" y="325" fill="#0F172A" font-weight="700">→ Change Mgmt</text>
    <text x="705" y="339" fill="#0F172A">Governance-Luecke</text>
  </g>

  <text x="60" y="716" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12">Quelle: Gartner, Deloitte, Fraunhofer IAIS, Bitkom 2024, IW Koeln 2025</text>
  <text x="1140" y="716" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="end">st-automatisierung.de</text>
</svg>
